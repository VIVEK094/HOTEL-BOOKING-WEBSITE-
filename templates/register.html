{%extends "base.html"%}
{%block title%}SignIn{%endblock%}
{%block body%}
<!-- filepath: c:\Users\VIVEK\env2\hotel\templates\signup.html -->
<style>
  body {
    background-image: url('https://images.unsplash.com/photo-1506748686214-e9df14d4d9d0?crop=entropy&cs=tinysrgb&fit=max&fm=jpg&ixid=MnwzNjUyOXwwfDF8c2VhcmNofDJ8fGx1eHVyeSUyMGhvdGVsfGVufDB8fHx8MTY4Mjk5MjQzNQ&ixlib=rb-1.2.1&q=80&w=1080');
    background-size: cover; /* Ensures the image covers the entire page */
    background-position: center; /* Centers the image */
    background-attachment: fixed; /* Keeps the background fixed during scrolling */
    font-family: 'Poppins', sans-serif;
    margin: 0;
    padding: 0;
}
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Poppins', sans-serif;
    }

    .signup-container {
      background-color:hsl(0, 11.50%, 89.80%);
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
      max-width: 400px;
      width: 100%;
      margin:auto;
      height:500px
    }

    .signup-container h2 {
      margin-bottom: 20px;
      font-weight: 700;
      text-align: center;
      color: #333;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      font-size: 14px;
      color: #555;
    }

    .form-group input {
      width: 100%;
      padding: 12px;
      border: 1px solid #ccc;
      border-radius: 8px;
      transition: border 0.3s;
    }

    .form-group input:focus {
      border-color: #74ebd5;
      outline: none;
    }

    .signup-button {
      width: 100%;
      padding: 12px;
      background-color: #f7c08a;;
      color: white;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      transition: background-color 0.3s;
    }

    .signup-button:hover {
      background-color: #e0a96d;
    }

    .signin-link {
      text-align: center;
      margin-top: 20px;
      font-size: 14px;
    }

    .signin-link a {
      color:rgb(251, 10, 10);
      text-decoration: none;
    }

    .signin-link a:hover {
      text-decoration: underline;
    }
    
</style>

<br>
<br>
<br>
<br>
<body>
<div class="signup-container">
    <h2>Create Account</h2>
    {% if messages %}
        <ul>
            {% for message in messages %}
                <li style="color: green;">{{ message }}</li>
            {% endfor %}
        </ul>
    {% endif %}
    <form method="POST" action="{% url 'register' %}">
      {% csrf_token %}
      <div class="form-group">
          <label for="name">Full Name</label>
          <input type="text" id="name" name="name" placeholder="John Doe" required>
      </div>
      <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" name="email" placeholder="you@example.com" required>
      </div>
      <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="••••••••" required>
      </div>
      <button type="submit" class="signup-button">Sign Up</button>
  </form>
</div>
</body>
</div>
<br>
    <br>
    <br>
    <br>
    <br>
    <br>
    
{%endblock body%}
