{%extends "base.html"%}
{%block title%}SignIn{%endblock%}
{%block body%}  
    <style>
      body {
        background-image: url('https://images.unsplash.com/photo-1506748686214-e9df14d4d9d0?crop=entropy&cs=tinysrgb&fit=max&fm=jpg&ixid=MnwzNjUyOXwwfDF8c2VhcmNofDJ8fGx1eHVyeSUyMGhvdGVsfGVufDB8fHx8MTY4Mjk5MjQzNQ&ixlib=rb-1.2.1&q=80&w=1080');
        background-size: cover; /* Ensures the image covers the entire page */
        background-position: center; /* Centers the image */
        background-attachment: fixed; /* Keeps the background fixed during scrolling */
        font-family: 'Poppins', sans-serif;
        margin: 0;
        padding: 0;
    }
        .login-container {
            background-color:hsl(0, 11.50%, 89.80%);
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
            width: 400px;
            text-align: center;
            margin:auto;
            height:500px;
        }
        .login-container h2 {
            margin-bottom: 30px;
            color: #343a40;
        }
        .login-container form {
            display: flex;
            flex-direction: column;
        }
        .login-container input {
            margin-bottom: 20px;
            padding: 10px;
            font-size: 1rem;
            border: 1px solid #ced4da;
            border-radius: 5px;
        }
        .login-container button {
            background-color: #f7c08a;
            color: #343a40;
            font-size: 1.2rem;
            font-weight: bold;
            padding: 10px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }
        .login-container button:hover {
            background-color: #e0a96d;
            color: #ffffff;
        }
        .login-container a {
            color:rgb(247, 7, 7);
            text-decoration: none;
        }
        .login-container a:hover {
            text-decoration: underline;
        }

        
    </style>

<br>
<br>
<br>
<br>
<br>
  <body>
    <div class="login-container">
        <h2>Log In</h2>
        {% if messages %}
    <div>
        {% for message in messages %}
            <p style="color: red;">{{ message }}</p>
        {% endfor %}
    </div>
        {% endif %}
        <form method="POST" action="{% url 'login' %}">
          {% csrf_token %}
          <label for="username">Username:</label>
          <input type="text" id="username" name="username" placeholder="Username" required>
          <label for="password">Password:</label>
          <input type="password" id="password" name="password" placeholder="Password" required>
          <button type="submit">Login</button>
        </form>
        <p>Don't have an account? <a href="/register">Register Here</a></p>
        <p>Or sign in with:</p>
        <a href="#">
            <button style="background-color: #4285F4; color: white; padding: 10px; border: none; border-radius: 5px; cursor: pointer;">
                Sign in with Google
            </button>
        </a>
    </div>
  </body>  
<br>
<br>

<br>
<br>

    
{%endblock body%}
